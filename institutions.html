    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #faf6ef;
        }

        nav {
            background: linear-gradient(90deg, #f5e9da 60%, #f9f6f2 100%);
            color: #111;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.08);
            border-radius: 0 0 18px 18px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-content {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .navbar-logo {
            position: absolute;
            right: 0;
            top: 100%;
            transform: translateY(-20px);
            height: 120px;
            width: 120px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            pointer-events: none;
            z-index: 1100;
            overflow: visible;
        }

        .navbar-logo img {
            max-height: 120px;
            max-width: 120px;
            border-radius: 50%;
            border: 4px solid #fffbe9;
            box-shadow: 0 6px 24px 0 rgba(0, 0, 0, 0.13);
            background: #fffbe9;
            transition: box-shadow 0.3s;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 36px;
        }

        nav ul li { display: inline; }

        nav ul li a {
            color: #111;
            text-decoration: none;
            font-size: 1.13em;
            padding: 10px 18px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        nav ul li a:hover {
            background: #f3e3c3;
            color: #004080;
            box-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.07);
        }

        .institutions-section {
            padding: 100px 24px 60px;
            min-height: 100vh;
            background: linear-gradient(135deg, #2d1f14 0%, #5a3a22 40%, #a87142 75%, #d9a566 100%);
        }

        .content-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .section-title {
            color: #fff;
            font-size: 2.6em;
            text-align: center;
            margin: 0 0 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }

        .section-subtitle {
            color: #fffbe9;
            text-align: center;
            margin: 0 0 32px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .institutions-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .result-count {
            margin-inline-end: auto;
            color: #5a3a22;
            font-weight: 600;
            font-size: 1.02em;
        }

        .search-input,
        .filter-select {
            padding: 10px 14px;
            border: 1px solid #e2d6c2;
            border-radius: 10px;
            background: #fffdf7;
            font-size: 0.98em;
            font-family: inherit;
            color: #333;
            transition: border 0.15s, box-shadow 0.15s;
        }

        .search-input { width: 260px; }

        .search-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: #c89060;
            box-shadow: 0 0 0 3px rgba(200, 144, 96, 0.18);
        }

        .clear-btn {
            padding: 10px 16px;
            background: #f5e9da;
            color: #5a3a22;
            border: 1px solid #e2d6c2;
            border-radius: 10px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }
        .clear-btn:hover { background: #ecdcc2; }

        .table-scroll {
            max-height: 65vh;
            overflow-y: auto;
            border: 1px solid #efe5d3;
            border-radius: 10px;
        }

        .institutions-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.96em;
        }

        .institutions-table thead th {
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, #f5e9da 0%, #ecdcc2 100%);
            color: #3b2814;
            font-weight: 700;
            padding: 13px 14px;
            text-align: right;
            border-bottom: 2px solid #d9c6a5;
            white-space: nowrap;
            z-index: 2;
        }

        .institutions-table tbody td {
            padding: 11px 14px;
            text-align: right;
            border-bottom: 1px solid #f1eadb;
            color: #2d2418;
            vertical-align: top;
        }

        .institutions-table tbody tr:nth-child(even) td { background: #fbf6ec; }
        .institutions-table tbody tr:hover td { background: #fdf1d6; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-stage { background: #fff3d6; color: #7a4d1a; border: 1px solid #f0d89b; }
        .badge-gender-בנים { background: #e2eefc; color: #1d4a85; border: 1px solid #c4ddf6; }
        .badge-gender-בנות { background: #fde2ec; color: #8a2a52; border: 1px solid #f6c4d6; }

        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: #8a6a45;
            font-size: 1.1em;
        }

        /* Scrollbar styling */
        .table-scroll::-webkit-scrollbar { width: 10px; }
        .table-scroll::-webkit-scrollbar-track { background: #f9f0df; border-radius: 10px; }
        .table-scroll::-webkit-scrollbar-thumb { background: #d9b988; border-radius: 10px; }
        .table-scroll::-webkit-scrollbar-thumb:hover { background: #c89c63; }

        .map-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-top: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .map-title { margin: 0; color: #3b2814; font-size: 1.35em; font-weight: 700; }
        .map-meta { color: #7a5a32; font-size: 0.95em; }
        #map {
            width: 100%;
            height: 560px;
            border-radius: 12px;
            border: 1px solid #efe5d3;
            touch-action: none;
            overscroll-behavior: contain;
        }
        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
            font-family: Arial, sans-serif;
            min-width: 220px;
        }
        .leaflet-popup-content strong { color: #3b2814; font-size: 1.05em; }
        .leaflet-popup-content .meta { color: #6b4d28; font-size: 0.92em; margin-top: 6px; line-height: 1.5; }
        .leaflet-popup-content a { color: #8a4d10; text-decoration: none; }

        @media (max-width: 720px) {
            .search-input { width: 100%; }
            .filter-section { justify-content: stretch; }
            .result-count { width: 100%; text-align: right; margin-inline-end: 0; }
            .section-title { font-size: 2em; }
        }
    </style>

    <script>
        const data = JSON.parse(document.getElementById('mosdotData').textContent);
        window.mosdotRows = data;
        const searchInput = document.getElementById('searchInput');
        const stageFilter = document.getElementById('stageFilter');
        const genderFilter = document.getElementById('genderFilter');
        const tableBody = document.getElementById('tableBody');
        const resultCount = document.getElementById('resultCount');
        const clearBtn = document.getElementById('clearBtn');

        // Populate filter dropdowns from data
        const stages = [...new Set(data.map(r => r.stage).filter(Boolean))].sort();
        const genders = [...new Set(data.map(r => r.gender).filter(Boolean))].sort();
        stages.forEach(s => {
            const o = document.createElement('option'); o.value = s; o.textContent = s;
            stageFilter.appendChild(o);
        });
        genders.forEach(g => {
            const o = document.createElement('option'); o.value = g; o.textContent = g;
            genderFilter.appendChild(o);
        });

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function render() {
            const q = searchInput.value.trim().toLowerCase();
            const stage = stageFilter.value;
            const gender = genderFilter.value;

            const filtered = data.filter(r => {
                if (stage && r.stage !== stage) return false;
                if (gender && r.gender !== gender) return false;
                if (!q) return true;
                return (r.name + ' ' + r.city + ' ' + r.address + ' ' + r.principal + ' ' + r.phone + ' ' + r.code)
                    .toLowerCase().includes(q);
            });

            resultCount.textContent = `מציג ${filtered.length} מתוך ${data.length} מוסדות`;

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" class="no-results">לא נמצאו מוסדות התואמים לחיפוש</td></tr>';
                return;
            }

            const rows = filtered.map(r => {
                const genderClass = r.gender ? `badge badge-gender-${r.gender}` : '';
                const genderHtml = r.gender ? `<span class="${genderClass}">${escapeHtml(r.gender)}</span>` : '';
                const stageHtml = r.stage ? `<span class="badge badge-stage">${escapeHtml(r.stage)}</span>` : '';
                const phoneHtml = r.phone ? `<a href="tel:${escapeHtml(r.phone.replace(/\s/g,''))}" style="color:#5a3a22;text-decoration:none;">${escapeHtml(r.phone)}</a>` : '';
                return `<tr>
                    <td>${escapeHtml(r.code)}</td>
                    <td><strong>${escapeHtml(r.name)}</strong></td>
                    <td>${escapeHtml(r.city)}</td>
                    <td>${stageHtml}</td>
                    <td>${genderHtml}</td>
                    <td>${escapeHtml(r.address)}</td>
                    <td>${escapeHtml(r.principal)}</td>
                    <td>${phoneHtml}</td>
                </tr>`;
            }).join('');
            tableBody.innerHTML = rows;
        }

        searchInput.addEventListener('input', render);
        stageFilter.addEventListener('change', render);
        genderFilter.addEventListener('change', render);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            stageFilter.value = '';
            genderFilter.value = '';
            render();
        });

        render();
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script>
        (function initMap() {
            const rows = window.mosdotRows || [];
            const located = rows.filter(r => typeof r.lat === 'number' && typeof r.lng === 'number');
            const mapMeta = document.getElementById('mapMeta');
            mapMeta.textContent = `${located.length} מתוך ${rows.length} מוסדות ממוקמים על המפה`;

            const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g,
                c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

            const map = L.map('map', {
                scrollWheelZoom: false,
                tap: true
            }).setView([31.5, 34.9], 7);

            const mapEl = document.getElementById('map');
            // Hover over the map → Leaflet handles wheel + ctrl+wheel (pinch).
            // Leave the map → page scroll/zoom resumes normal behavior.
            mapEl.addEventListener('mouseenter', () => map.scrollWheelZoom.enable());
            mapEl.addEventListener('mouseleave', () => map.scrollWheelZoom.disable());

            // Block the browser's own pinch-zoom-the-page behavior over the map.
            mapEl.addEventListener('wheel', (e) => {
                if (e.ctrlKey) e.preventDefault();
            }, { passive: false, capture: true });
            // Safari trackpad gesture events
            ['gesturestart', 'gesturechange', 'gestureend'].forEach(ev => {
                mapEl.addEventListener(ev, (e) => e.preventDefault(), { passive: false });
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            const cluster = L.markerClusterGroup({ maxClusterRadius: 45 });

            function popupHtml(r) {
                const phone = r.phone
                    ? `<a href="tel:${(r.phone||'').replace(/\s/g,'')}">${escapeHtml(r.phone)}</a>`
                    : '';
                return [
                    `<strong>${escapeHtml(r.name)}</strong>`,
                    `<div class="meta">`,
                    r.city ? `📍 ${escapeHtml(r.city)}<br>` : '',
                    r.address ? `${escapeHtml(r.address)}<br>` : '',
                    (r.stage || r.gender) ? `${escapeHtml([r.stage, r.gender].filter(Boolean).join(' · '))}<br>` : '',
                    r.principal ? `👤 ${escapeHtml(r.principal)}<br>` : '',
                    phone ? `📞 ${phone}` : '',
                    `</div>`
                ].join('');
            }

            located.forEach(r => {
                const marker = L.marker([r.lat, r.lng]);
                marker.bindPopup(popupHtml(r));
                cluster.addLayer(marker);
            });
            map.addLayer(cluster);

            if (located.length > 0) {
                try { map.fitBounds(cluster.getBounds(), { padding: [30, 30] }); } catch (e) {}
            }

            setTimeout(() => map.invalidateSize(), 50);
        })();
    </script>
</body>
